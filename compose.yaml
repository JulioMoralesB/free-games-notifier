services:
  free-games-notifier:
    # Pre-built image from GitHub Container Registry.
    # Pin to a specific version for reproducible deployments:
    # image: ghcr.io/juliomoralesb/free-games-notifier:1.2.3
    image: ghcr.io/juliomoralesb/free-games-notifier:latest
    container_name: free-games-notifier
    # Pass everything from .env into the container automatically.
    # No need to enumerate variables here — config.py handles all defaults.
    env_file:
      - .env
    ports:
      - "${API_PORT:-8000}:${API_PORT:-8000}"
    restart: unless-stopped
    volumes:
      - type: bind
        source: ${DATA_PATH}
        target: /mnt/data
      - type: bind
        source: ${LOGS_PATH}
        target: /mnt/logs
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - apollo-server-network

networks:
  apollo-server-network:
    external: true
